# Example benchmark plan for comparing classical morphology, SSL embeddings,
# and ProCode decoding quality after phenotype extraction.

benchmark:
  input: outputs/phenotype/phenotype_cp_ssl.tsv
  output_dir: outputs/benchmarks/ssl_feature_comparison
  label_col: sgRNA
  perturbation_col: sgRNA
  replicate_col: replicate

  feature_sets:
    classical:
      prefixes: [cell_, nuclei_, cytoplasm_]
    ssl:
      prefixes: [ssl_]
    combined:
      prefixes: [cell_, nuclei_, cytoplasm_, ssl_]

  procode:
    channels: [procode_a, procode_b, procode_c]
    expected_signatures: ["100", "010", "001", "110", "101", "011"]
    threshold: null
    min_margin: null
    max_crosstalk: 0.25


# Scope note: SSL features are downstream phenotype representations pooled inside accepted masks.
# They are not a replacement for CellPose/SAM/Brieflow segmentation unless a separate
# segmentation model is trained and validated against ground-truth masks.
scope_note: downstream_feature_extraction_not_segmentation_replacement
mask_metadata_columns:
  - meta_mask_source
  - meta_mask_source_detail
  - meta_segmentation_model
  - meta_segmentation_qc_status
  - meta_ssl_role
